name: 19- Managing concurrency

on:
  workflow_dispatch:
concurrency: 
  group: ${{github.workflow}}-${{github.head_ref}}
jobs:
    ping-url:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Ping URL
            uses: ./.github/actions/docker-ping-url
            with: 
                url : 'https://www.googletr.com'
                max_trails: 20
                delay: 5
                
              
  
