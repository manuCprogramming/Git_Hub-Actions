name: Caching_Workflow
on:
    workflow_dispatch:
      inputs:
        use-cache:
            description: Whether to execute cache step
            type: boolean
            default: true
        node-version:
            description: Select Node Version
            type: choice
            options:
                - 18.x
                - 20.x
                - 21.x
            default: 21.x
            
              - 

jobs:
  
  build:
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: 13-caching\react-app
    steps:
          - name: Checkout code
            uses: actions/checkout@v4

          - name: Setup Node
            uses: actions/setup-node@v3
            with:
                node-version: ${{inputs.node-version}}
          - name: Install Dependencies
            run: |
                npm ci
          - name: Testing
            run: npm run test

          - name: Building
            run: npm run build
          - name: Deploy
            run: echo "deploying.... "

      

        
