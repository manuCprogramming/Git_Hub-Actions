name: Artifacts

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: "Node version to use"
        required: true
        default: "18"
      use-cache:
        description: "Use dependency cache?"
        required: true
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching/react-app

    outputs:
      cacheKEY: ${{ steps.compose.outputs.cacheKEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}

      - name: Compose Cache key
        id: compose
        run: echo "cacheKEY=deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Download Cache dependencies
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v3
        id: cache
        with:
          path: 13-caching/react-app/node_modules
          key: ${{ steps.compose.outputs.cacheKEY }}

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Testing
        run: npm test

      - name: Building
        run: npm run build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: 13-caching/react-app/build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app
          path: build

      - name: Show files
        run: ls -R
