name: Docker_Actions
on:
    workflow_dispatch:
      inputs:
        url:
          type: string
          default: https://www.google.com

jobs:
    ping-url:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Ping URL
            uses: ./.github/actions/docker-ping-url
            with: 
                url : ${{inputs.url}}
  