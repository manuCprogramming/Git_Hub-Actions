name: Welcome to Matrix
on:
    workflow_dispatch: 

jobs:
    Compactibilty-Check:
        name: ${{matrix.OS}}-installing-${{matrix.Node_Version}}
        runs-on: ${{matrix.OS}}
        strategy:
          matrix:
            Node_Version: [20,18]
            OS: 
                - ubuntu-latest
                - windows-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v4
          - name: Setup Node
            uses: actions/setup-node@v4
            with:
                node-version: ${{matrix.Node_Version}}
            