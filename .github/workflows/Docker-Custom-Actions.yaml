name: Docker_Actions
on:
    workflow_dispatch:
      inputs:
        url:
          type : choice
          options:
            - 'https://www.google.com'
            - 'https://www.manuspage.com'
            - 'httr.>'
          default: https://www.google.com
        max_trails:
          default: '10'
          required: false
        delay:
          type: string
          default: '5'



          


jobs:
    ping-url:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v4
          - name: Ping URL
            uses: ./.github/actions/docker-ping-url
            with: 
                url : ${{inputs.url}}
                max_trails: ${{inputs.max_trails}}
                delay: ${{inputs.delay}}
              
  