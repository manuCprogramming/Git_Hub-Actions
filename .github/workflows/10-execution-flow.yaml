name: 10 - Controlling the Execution flow

on:
  workflow_dispatch:
    inputs:
      pass-unit-tests:
        type: boolean
        description: Whether unit tests will pass or not
        default: true
        
jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Lint and build
        run: echo "Linting and building project"

  unit-test:
    runs-on: ubuntu-latest
    needs: lint-build
    steps:
      - name: Running unit tests
        run: echo "running unit testcases"
      - name: Failling Test
        if: ${{!inputs.pass-unit-tests}}
        run:  exit 1
        
  deploy-nonprod:
    runs-on: ubuntu-latest
    needs: 
        - lint-build
        - unit-test
        
    steps:
      - name: Deploying to non prod
        run: echo "Deploying ..."

        
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    steps:
      - name: e2e test
        run: echo "End to end testing taking place"
  load-tests:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    steps:
      - name: Load test
        run: echo "Load testing taking place"  

        
  deploy-prod:
    runs-on: ubuntu-latest
    needs: 
        - e2e-tests
        - load-tests
    steps:
      - name: Deploying to non prod
        run: echo "Deploying TO PRODUCTION..."
        
  
