name: Caching_Workflow

on:
  workflow_dispatch:
    inputs:
      use-cache:
        description: Whether to execute cache step
        type: boolean
        default: true
      node-version:
        description: Select Node Version
        type: choice
        options:
          - 18.x
          - 20.x
          - 21.x
        default: 21.x

jobs:

  install-cache:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 13-caching/react-app
    outputs:
      cacheKEY: ${{ steps.compose.outputs.cacheKEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}

      - name: Compose Cache key
        id: compose
        run: echo "cacheKEY=deps-node-modules-${{ hashFiles('13-caching/react-app/package-lock.json') }}" >> "$GITHUB_OUTPUT"

      - name: Download Cache dependencies
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v3
        id: cache
        with:
          path: 13-caching/react-app/node_modules
          key: ${{ steps.compose.outputs.cacheKEY }}

      - name: Install Dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Testing
        run: npm run test

      - name: Building
        run: npm run build

      - name: Deploy
        run: echo "deploying.... "

  build:
    runs-on: ubuntu-latest
    needs: install-cache
    defaults:
      run:
        working-directory: 13-caching/react-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node-version }}

      - name: Download Cache dependencies
        if: ${{ inputs.use-cache }}
        uses: actions/cache@v3
        id: cache
        with:
          path: 13-caching/react-app/node_modules
          key: ${{ needs.install-cache.outputs.cacheKEY }}

      - name: Testing
        run: npm run test

      - name: Building
        run: npm run build

      - name: Deploy
        run: echo "deploying.... "